<style>

  .inno-meta {

  /* Plattegrond SVG */
  .layout-svg {

</style>

      }],
      4: [
        {
          text: 'MOS-AANPAK: gele mosplekken verwijderen',
          info: 'HET KNALGELE MOS dat je ziet is Schoorsteenmos (Ceratodon purpureus) of Gewoon dikkopmos. Pioniermos dat duidt op:\n• Uitgeput substraat (typisch na 6-8 jaar)\n• Lagere pH (verzuring door organisch materiaal)\n• Meer vocht op plekken waar sedum verzwakt\n\nIS HET SCHADELIJK? Niet direct — mos parasiteert niet. Maar:\n• Houdt vocht tegen substraat = gunstiger voor mos, ongunstiger voor sedum\n• Verstikt trager-groeiende sedum eronder\n• Verspreidt exponentieel via sporen\n\nAANPAK IN STAPPEN:\n1. In maart kalk gestrooid (zie voorjaarsbeurt)? Wacht 2-3 weken\n2. Mos wordt bruin/rossig = afgestorven\n3. Met zachte harkbezem of gewoon met handen eruit halen\n4. Niet agressief schrapen — je beschadigt dakbedekking of sedumstek eronder\n5. Kale plekken direct met sedumstekken vullen (zie volgende taak)\n\nNIET doen: antimos-middelen (bevatten ijzersulfaat = beschadigt dakbedekking op lange termijn).'

  },
  {

    tips: [

  {

const INNOVATIONS = [
  { title: 'Bokashi-compostbak', desc: 'Fermenteert keukenafval in 2 weken tot bodemverbeteraar. Geen stank, werkt binnen. Ideaal voor rozen en vruchtbomen. Investering ~€60.' },
  { title: 'Regenton + druppelslang', desc: 'Regenton op druppelslang door border en rond vruchtbomen. Gratis water, diep wortelen, 70% minder verdamping dan sproeien.' },
  { title: 'Mycorrhiza bij nieuwe aanplant', desc: 'Schimmelsporen die symbiose aangaan met wortels. 50% betere groei, droogtetoleranter. €15 per zakje, cruciaal voor vruchtbomen.' },
  { title: 'pH-meter (€20)', desc: 'Laat zien waar je grond zuur of alkalisch is. Gericht kalken ipv hele tuin. Voorkomt over-kalking rond hortensia\'s (die willen juist zuur).' },
  { title: 'Inheemse bufferzone naar bos', desc: 'Smalle strook langs bos met brandnetel, look-zonder-look, salomonszegel. Ecologische verbinding, trekt natuurlijke plaagbestrijders aan.' },

  { title: 'Lijmband appelbomen (€5)', desc: 'Rond stam in oktober. Vangt vrouwtjes wintervlinder. Voorkomt rupsen in voorjaar zonder spuiten. Simpelste win van hele tuin.' }
];

// === STATE ===
const state = {
  month: new Date().getMonth() + 1, // 1-12
  tab: 'taken',
  zone: 'alle',
  checked: {},
  openInfo: {}
};

// Load checked state from localStorage
try {
  const saved = localStorage.getItem('tuin_checked_v1');
  if (saved) state.checked = JSON.parse(saved);
} catch(e) {}

function saveChecked() {
  try {
    localStorage.setItem('tuin_checked_v1', JSON.stringify(state.checked));
  } catch(e) {}
}

// === HELPERS ===
function getTaskText(task) {
  return typeof task === 'string' ? task : task.text;
}
function getTaskInfo(task) {
  return typeof task === 'object' ? task.info : null;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// === RENDER MONTH SELECTOR ===
function renderMonths() {
  const el = document.getElementById('monthSelect');
  el.innerHTML = MONTHS.map((m, i) => {
    const mn = i + 1;
    const cls = state.month === mn ? 'month-btn active' : 'month-btn';
    return `<button class="${cls}" data-month="${mn}">${m}</button>`;
  }).join('');
  el.querySelectorAll('.month-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.month = parseInt(btn.dataset.month);
      render();
    });
  });
}

// === RENDER TABS ===
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
    render();
  });
});

// === RENDER CONTENT ===
function render() {
  renderMonths();
  const content = document.getElementById('content');

  if (state.tab === 'taken') {
    content.innerHTML = renderTakenTab();
    attachTakenHandlers();
  } else if (state.tab === 'planten') {
    content.innerHTML = renderPlantenTab();
    attachPlantenHandlers();
  } else if (state.tab === 'bestellen') {
    content.innerHTML = renderBestellenTab();
  } else if (state.tab === 'weer') {
    content.innerHTML = renderWeerTab();
  } else if (state.tab === 'innovatie') {
    content.innerHTML = renderInnovatieTab();
  }
}

// === TAKEN TAB ===
function renderTakenTab() {
  const plantsWithTasks = Object.entries(PLANTS).filter(([key, plant]) => {
    if (!plant.tasks[state.month]) return false;
    if (state.zone !== 'alle' && plant.zone !== state.zone) return false;
    return true;
  });

  let html = renderZoneFilter();

  if (plantsWithTasks.length === 0) {
    html += '<div class="empty">Geen taken deze maand voor deze zone.</div>';
    return html;
  }

  plantsWithTasks.forEach(([key, plant]) => {
    html += renderPlantCard(key, plant, state.month);
  });

  html += `<button class="reset-btn" onclick="resetChecks()">↺ Reset vinkjes deze maand</button>`;

  return html;
}

function renderZoneFilter() {
  const zoneKeys = ['alle', ...Object.keys(ZONES)];
  return `<div class="zone-filter">${zoneKeys.map(z => {
    const cls = state.zone === z ? 'zone-btn active' : 'zone-btn';
    const label = z === 'alle' ? 'Alle zones' : (ZONES[z]?.icon + ' ' + ZONES[z]?.label);
    return `<button class="${cls}" data-zone="${z}">${label}</button>`;
  }).join('')}</div>`;
}

function renderPlantCard(key, plant, month) {
  const tasks = plant.tasks[month] || [];
  const hasIssues = plant.issues && plant.issues.length > 0;

  let html = `<div class="card ${hasIssues ? 'has-issues' : ''}">
    <div class="card-header">
      <div class="card-icon">${plant.icon}</div>
      <div class="card-title">
        <h3>${escapeHtml(plant.name)}</h3>
        ${plant.sub ? `<div class="sub">${escapeHtml(plant.sub)}</div>` : ''}
      </div>
    </div>`;

  if (hasIssues) {
    html += `<div class="issues">⚠️ ${escapeHtml(plant.issues)}</div>`;
  }

  html += '<div class="tasks">';
  tasks.forEach((task, idx) => {
    const taskText = getTaskText(task);
    const taskInfo = getTaskInfo(task);
    const checkKey = `${month}-${key}-${idx}`;
    const done = state.checked[checkKey];
    const infoKey = `${key}-${idx}`;
    const infoOpen = state.openInfo[infoKey];

    html += `<div class="task ${done ? 'done' : ''}">
      <div class="task-check ${done ? 'done' : ''}" data-check="${checkKey}">${done ? '✓' : ''}</div>
      <div class="task-body">
        <div class="task-text">${escapeHtml(taskText)}${taskInfo ? `<button class="task-info-btn" data-info="${infoKey}">i</button>` : ''}</div>
        ${taskInfo ? `<div class="task-info ${infoOpen ? 'open' : ''}" data-info-box="${infoKey}">${escapeHtml(taskInfo)}</div>` : ''}
      </div>
    </div>`;
  });
  html += '</div>';

  if (plant.innovatie) {
    html += `<div class="innovatie">💡 ${escapeHtml(plant.innovatie)}</div>`;
  }

  // Special: layout SVG for appelboom_layout
  if (key === 'appelboom_layout' && month === 4) {
    html += renderAppelLayoutSVG();
  }

  html += '</div>';
  return html;
}

  return `<svg class="layout-svg" viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg">

    <text x="150" y="25" font-size="10" text-anchor="middle" fill="#6b6247" font-family="Georgia">ACHTERTUIN (schema)</text>

    <text x="150" y="50" font-size="8" text-anchor="middle" fill="#4a5d3a" font-family="Georgia">Achterin</text>

    <line x1="80" y1="190" x2="210" y2="190" stroke="#8a7d5c" stroke-dasharray="3,3"/>

    <line x1="145" y1="180" x2="150" y2="90" stroke="#8a7d5c" stroke-dasharray="3,3"/>
    <text x="175" y="145" font-size="7" text-anchor="middle" fill="#6b6247" font-family="Georgia">20m</text>

    <text x="150" y="43" font-size="8" text-anchor="middle" fill="#4a5d3a" font-family="Georgia">← bos →</text>
    <rect x="60" y="150" width="30" height="8" fill="#fff8c5" stroke="#d4c470" rx="1"/>
    <text x="75" y="145" font-size="6" text-anchor="middle" fill="#6b6247" font-family="Georgia">mezenkast</text>
    <rect x="135" y="115" width="30" height="8" fill="#fff8c5" stroke="#d4c470" rx="1"/>
    <text x="150" y="135" font-size="6" text-anchor="middle" fill="#6b6247" font-family="Georgia">mezenkast</text>
  </svg>`;
}

function attachTakenHandlers() {
  document.querySelectorAll('.zone-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.zone = btn.dataset.zone;
      render();
    });
  });
  document.querySelectorAll('[data-check]').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.check;
      state.checked[key] = !state.checked[key];
      saveChecked();
      render();
    });
  });
  document.querySelectorAll('[data-info]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = btn.dataset.info;
      state.openInfo[key] = !state.openInfo[key];
      render();
    });
  });
}

function resetChecks() {
  if (!confirm('Alle vinkjes voor ' + MONTHS[state.month-1] + ' wissen?')) return;
  const prefix = state.month + '-';
  Object.keys(state.checked).forEach(k => {
    if (k.startsWith(prefix)) delete state.checked[k];
  });
  saveChecked();
  render();
}
window.resetChecks = resetChecks;

// === PLANTEN TAB ===
function renderPlantenTab() {
  const sorted = Object.entries(PLANTS).sort((a, b) => a[1].name.localeCompare(b[1].name, 'nl'));
  let html = '<div class="info-box">Klik op een plant voor de details. Je ziet dan alle maandelijkse taken en extra info.</div>';
  const byZone = {};
  sorted.forEach(([key, plant]) => {
    if (!byZone[plant.zone]) byZone[plant.zone] = [];
    byZone[plant.zone].push([key, plant]);
  });
  Object.keys(ZONES).forEach(zoneKey => {
    if (!byZone[zoneKey]) return;
    html += `<div class="order-month-label">${ZONES[zoneKey].icon} ${ZONES[zoneKey].label}</div>`;
    byZone[zoneKey].forEach(([key, plant]) => {
      html += `<a class="plant-link" data-plant="${key}" href="#">
        ${plant.icon} ${escapeHtml(plant.name)}
        ${plant.sub ? `<div class="p-sub">${escapeHtml(plant.sub)}</div>` : ''}
      </a>`;
    });
  });
  return html;
}

function attachPlantenHandlers() {
  document.querySelectorAll('[data-plant]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      showPlantDetail(el.dataset.plant);
    });
  });
}

function showPlantDetail(key) {
  const plant = PLANTS[key];
  if (!plant) return;
  let html = `<button class="reset-btn" onclick="state.tab='planten';render();">← Terug naar lijst</button>
    <div class="card ${plant.issues ? 'has-issues' : ''}">
      <div class="card-header">
        <div class="card-icon" style="font-size:28px">${plant.icon}</div>
        <div class="card-title">
          <h3 style="font-size:18px">${escapeHtml(plant.name)}</h3>
          ${plant.sub ? `<div class="sub">${escapeHtml(plant.sub)}</div>` : ''}
        </div>
      </div>`;
  if (plant.issues) html += `<div class="issues">⚠️ ${escapeHtml(plant.issues)}</div>`;
  html += '<h4 style="margin:12px 0 6px;font-weight:normal;color:#6b6247;font-size:13px;text-transform:uppercase;letter-spacing:1px">Taken per maand</h4>';
  for (let m = 1; m <= 12; m++) {
    if (!plant.tasks[m]) continue;
    html += `<div style="margin:10px 0;padding:8px 10px;background:#f4f1ea;border-radius:6px">
      <div style="font-size:12px;color:#8a7d5c;font-weight:600;margin-bottom:4px">${MONTHS[m-1]}</div>`;
    plant.tasks[m].forEach(task => {
      const text = getTaskText(task);
      const info = getTaskInfo(task);
      html += `<div style="font-size:14px;margin:4px 0">• ${escapeHtml(text)}</div>`;
      if (info) html += `<div style="font-size:12px;color:#4a5d3a;margin-left:12px;margin-bottom:6px;white-space:pre-wrap;line-height:1.6">${escapeHtml(info)}</div>`;
    });
    html += '</div>';
  }
  if (plant.innovatie) html += `<div class="innovatie">💡 ${escapeHtml(plant.innovatie)}</div>`;
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}
window.state = state;
window.render = render;

// === BESTELLEN TAB ===
function renderBestellenTab() {
  let html = '<div class="info-box"><strong>Tip:</strong> bestel iets 1 maand voor je het nodig hebt. Sommige zaden/middelen zijn uitverkocht in piekperiodes.</div>';
  const currentMonth = state.month;
  // Current month first
  const orderedMonths = [];
  for (let i = 0; i < 12; i++) {
    const m = ((currentMonth - 1 + i) % 12) + 1;
    if (ORDER_ALERTS[m] && ORDER_ALERTS[m].length) orderedMonths.push(m);
  }
  orderedMonths.forEach(m => {
    const isNow = m === currentMonth;
    html += `<div class="order-month-label">${MONTHS[m-1]}${isNow ? ' — NU' : ''}</div>`;
    ORDER_ALERTS[m].forEach(alert => {
      html += `<div class="order-card">
        <div class="order-item">${escapeHtml(alert.item)}</div>
        <div class="order-reason">${escapeHtml(alert.reason)}</div>
      </div>`;
    });
  });
  return html;
}

// === WEER TAB ===
function renderWeerTab() {
  let html = '<div class="info-box">Dit zijn vaste weerscenario\'s met actieplannen. De app toont geen live weer — vraag Claude direct als je specifieke weersverwachting wilt matchen aan taken.</div>';
  WEATHER_SCENARIOS.forEach(s => {
    html += `<div class="weather-card" style="border-left-color:${s.color}">
      <h4><span class="emo">${s.icon}</span>${escapeHtml(s.title)}</h4>
      <ul>${s.tips.map(t => `<li>${escapeHtml(t)}</li>`).join('')}</ul>
    </div>`;
  });
  return html;
}

// === INNOVATIE TAB ===
function renderInnovatieTab() {
  let html = '<div class="info-box">Ideeën om de tuin efficiënter, leuker of duurzamer te maken.</div>';
  INNOVATIONS.forEach(i => {
    html += `<div class="inno-card">
      <h4>${i.icon} ${escapeHtml(i.title)}</h4>
      <div class="inno-desc">${escapeHtml(i.description)}</div>
      <div class="inno-meta">
        ${i.cost ? `<span>💰 ${escapeHtml(i.cost)}</span>` : ''}
        ${i.time ? `<span>⏱ ${escapeHtml(i.time)}</span>` : ''}
        ${i.impact ? `<span>📊 ${escapeHtml(i.impact)}</span>` : ''}
      </div>
    </div>`;
  });
  return html;
}

// Initial render
render();

if ('serviceWorker' in navigator && location.protocol === 'https:') {

}
